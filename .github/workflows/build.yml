name: TDR Tag and pre deploy
on:
  push:
    branches:
      - master

permissions: {}

jobs:
  pre-deploy:
    permissions: { contents: write, id-token: write }
    uses: nationalarchives/tdr-github-actions/.github/workflows/lambda_build.yml@f318ce8a5d99c08b1235663f97fdb1b35844674e # v0.0.39
    with:
      lambda-name: ecr-scan
      repo-name: tdr-ecr-scan
      artifact-name: ecr-scan
      build-command: |
        sbt assembly
    secrets:
      MANAGEMENT_ACCOUNT: ${{ secrets.MANAGEMENT_ACCOUNT }}
      WORKFLOW_PAT: ${{ secrets.WORKFLOW_PAT }}
  deploy:
    permissions: { contents: write, id-token: write }
    needs: pre-deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - run: gh workflow run deploy.yml -f to-deploy=${NEXT_VERSION}
        env:
          GITHUB_TOKEN: ${{ secrets.WORKFLOW_PAT }}
          NEXT_VERSION: ${{ needs.pre-deploy.outputs.next-version }}
